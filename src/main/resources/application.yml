spring:
  application:
    name: digitalbank
  datasource:
    url: jdbc:postgresql://localhost:5433/digitalbank
    username: digitalbank
    password: digitalbank
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:ZGlnaXRhbGJhbmtTdXBlclNlY3JldEtleUZvckp3dDIwMjQhIQ==}
    expiration-ms: 86400000
  account:
    max-initial-balance: 1000.00

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.compass.digitalbank.notification: INFO
