services:
  postgres:
    image: postgres:16-alpine
    container_name: digitalbank-postgres
    environment:
      POSTGRES_DB: digitalbank
      POSTGRES_USER: digitalbank
      POSTGRES_PASSWORD: digitalbank
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitalbank -d digitalbank"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
